appId: com.diegopinochet.playbook
productName: Playbook
artifactName: ${productName}-${version}-${arch}.${ext}
directories:
  output: release
files:
  - "out/**/*"
  - "package.json"
  - "!**/node_modules/@playbook/**"
  - "!**/.turbo/**"
  - "!**/*.tsbuildinfo"
asarUnpack:
  - "node_modules/ffmpeg-static/**"
mac:
  category: public.app-category.video
  icon: build/icon.icns
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null
dmg:
  writeUpdateInfo: false
publish:
  provider: github
  owner: DiegoPinochet
  repo: playbook
  releaseType: release
  vPrefixedTagName: true
